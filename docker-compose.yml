version: '3.8'

services:
  evolution_api:
    image: evoapicloud/evolution-api:v2.1.1
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - API_KEY=dairybook_global_apikey
      # Database configs (using SQLite)
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_CLIENT=sqlite
      - DATABASE_CONNECTION_FILENAME=database.sqlite
      # Store session data locally
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP_TO=100
    volumes:
      - evolution_data:/evolution/apps/api/db
      - evolution_instances:/evolution/apps/api/instances

volumes:
  evolution_data:
  evolution_instances:
