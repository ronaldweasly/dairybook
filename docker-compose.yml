version: '3.8'

services:
  evolution_api:
    image: evoapicloud/evolution-api:v2.1.1
    container_name: evolution_api
    restart: always
    network_mode: "host"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=dairybook_global_apikey
      # Database configs (using local PostgreSQL)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres_password@localhost:5432/evolution?schema=public
      # Cache configs (using local instead of Redis)
      - CACHE_REDIS_ENABLED=false
      # Store session data locally
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP_TO=100
    volumes:
      - evolution_data:/evolution/apps/api/db
      - evolution_instances:/evolution/apps/api/instances

volumes:
  evolution_data:
  evolution_instances:
